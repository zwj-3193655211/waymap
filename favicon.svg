<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5efe6"/>
      <stop offset="100%" stop-color="#ede3d0"/>
    </linearGradient>
  </defs>
  <!-- 印章虚线圈 -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="none" stroke="#a8324a" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.45"/>
  <!-- 主方框（轻微倾斜 -2°）-->
  <g transform="rotate(-2 32 32)">
    <rect x="4" y="4" width="56" height="56" rx="6" fill="url(#bg)" stroke="#a8324a" stroke-width="3"/>
    <text x="32" y="21" font-family="'Ma Shan Zheng','STKaiti','Kaiti SC','楷体',cursive" font-size="17" font-weight="400" fill="#a8324a" text-anchor="middle">三</text>
    <text x="32" y="38" font-family="'Ma Shan Zheng','STKaiti','Kaiti SC','楷体',cursive" font-size="17" font-weight="400" fill="#a8324a" text-anchor="middle">下</text>
    <text x="32" y="55" font-family="'Ma Shan Zheng','STKaiti','Kaiti SC','楷体',cursive" font-size="17" font-weight="400" fill="#a8324a" text-anchor="middle">乡</text>
  </g>
</svg>
