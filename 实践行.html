    animation: kdSlideIn 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes kdSlideIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1);    }
  }

  .key-dialog .kd-title {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-serif);
    font-size: 19px; font-weight: 400;
    color: var(--text-0);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .key-dialog .kd-title .kd-icon { font-size: 20px; }

  .key-dialog .kd-status {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-2);
    margin-bottom: 14px;
    letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
  }
  .key-dialog .kd-status .kd-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block;
  }
  .key-dialog .kd-status.configured .kd-dot {
    background: var(--ink-green);
    box-shadow: 0 0 6px rgba(74, 90, 58, 0.6);
  }
  .key-dialog .kd-status.unset .kd-dot {
    background: var(--seal);
    box-shadow: 0 0 6px rgba(168, 50, 74, 0.5);
  }
  .key-dialog .kd-status .kd-mask {
    font-weight: 500;
    color: var(--text-0);
    letter-spacing: 0.05em;
  }
  .key-dialog .kd-status .kd-clear-link {
    margin-left: auto;
    color: var(--seal);
    cursor: pointer;
    user-select: none;
    border: 0; background: transparent;
    font: inherit;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .key-dialog .kd-status .kd-clear-link:hover { background: rgba(168, 50, 74, 0.10); }

  .key-dialog .kd-hint {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-2);
    line-height: 1.6;
    background: rgba(58, 40, 24, 0.04);
    border-left: 2px solid var(--ink);
    padding: 8px 10px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 14px;
  }
  .key-dialog .kd-hint a {
    color: var(--ink);
    text-decoration: underline;
    word-break: break-all;
  }

  .key-dialog .kd-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
    display: block;
  }

  .key-dialog .kd-input-wrap {
    position: relative;
    margin-bottom: 6px;
  }
  .key-dialog .kd-input {
    width: 100%;
    padding: 12px 88px 12px 12px;
    border-radius: 9px;
    border: 1px solid var(--line-strong);
    background: rgba(255,255,255,0.06);
    color: var(--text-0);
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    outline: none;
    transition: all 0.18s;
    -webkit-appearance: none;
    appearance: none;
  }
  .key-dialog .kd-input:focus {
    border-color: var(--seal);
    background: rgba(168, 50, 74, 0.06);
    box-shadow: 0 0 0 3px rgba(168, 50, 74, 0.12);
  }
  .key-dialog .kd-input::placeholder {
    color: var(--text-3);
    font-weight: 400;
    letter-spacing: 0.02em;
  }
  .key-dialog .kd-toggle {
    position: absolute;
    top: 50%; right: 8px;
    transform: translateY(-50%);
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .key-dialog .kd-toggle:hover {
    color: var(--ink);
    border-color: var(--ink);
  }

  .key-dialog .kd-counter {
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--text-3);
    text-align: right;
    margin-bottom: 16px;
    letter-spacing: 0.04em;
  }

  .key-dialog .kd-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 4px;
  }
  .key-dialog .kd-btn {
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--text-1);
    font-family: var(--font-mono);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    -webkit-tap-highlight-color: transparent;
  }
  .key-dialog .kd-btn:hover { color: var(--ink); border-color: var(--ink); background: rgba(6,182,212,0.06); }
  .key-dialog .kd-btn.primary {
    background: linear-gradient(135deg, var(--ink), var(--gray));
    color: #fff;
    border-color: var(--ink);
    box-shadow: 0 0 12px rgba(58, 40, 24, 0.25);
  }
  .key-dialog .kd-btn.primary:hover {
    box-shadow: 0 0 18px rgba(58, 40, 24, 0.4);
    transform: translateY(-1px);
  }
  .key-dialog .kd-btn.danger {
    color: var(--seal);
    border-color: rgba(168, 50, 74, 0.5);
  }
  .key-dialog .kd-btn.danger:hover {
    background: rgba(168, 50, 74, 0.10);
    border-color: var(--seal);
  }

  /* ===================== 头部按钮 ===================== */
  .header-search-btn, .header-reset-btn {
    padding: 5px 11px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04);
    color: var(--text-1);
    font-family: var(--font-mono);
    font-size: 11px; cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .header-search-btn:hover, .header-reset-btn:hover {
    color: var(--ink);
    border-color: rgba(6,182,212,0.3);
    background: rgba(6,182,212,0.06);
  }
  .header-search-btn.active {
    background: rgba(6,182,212,0.10);
    color: #5e4a3a;
    border-color: rgba(6,182,212,0.4);
    box-shadow: inset 0 0 0 1px rgba(6,182,212,0.2);
  }
  .header-reset-btn.active {
    color: #4a5a3a; border-color: rgba(74,90,58,0.4);
    background: rgba(74,90,58,0.08);
  }
  .header-reset-btn:hover { color: var(--seal); border-color: var(--seal); }
  .header-reset-btn.active:hover { color: #4a5a3a; border-color: #4a5a3a; }

  @media (max-width: 768px) {
    .search-panel { top: 8px; width: calc(100vw - 24px); max-width: none; }
    .header-search-btn .btn-label { display: none; }
    .header-search-btn, .header-reset-btn {
      padding: 4px 7px; font-size: 10px; gap: 3px;
      white-space: nowrap;
    }
    .header-expand-btn {
      top: max(8px, calc(env(safe-area-inset-top) + 8px));
    }
    .progress-bar-wrap { margin-left: auto; }
    .progress-bar { width: 64px; }
    .progress-bar-wrap .label { font-size: 8px; }
    .header-toggle-btn { flex-shrink: 0; }
    .edit-mode-banner { bottom: 76px; font-size: 11px; padding: 6px 12px; }
    .route-info .route-item .route-actions { opacity: 0.7 !important; }
    .route-act-btn { width: 24px; height: 24px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="app-header" id="appHeader">
    <div class="header-inner">
      <div class="header-title">
        <div class="logo"><svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><polygon points="22,5 28.4,15.6 39,22 28.4,28.4 22,39 15.6,28.4 5,22 15.6,15.6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="22" cy="22" r="3" fill="currentColor"/></svg></div>
        <div>
          <h1>实践行</h1>
        </div>
      </div>
      <div class="header-right">
        <span class="hud-capsule indigo"><span class="label">站点</span><span class="value" id="hudStations">0 / 7</span></span>
        <span class="hud-capsule magenta"><span class="label">任务</span><span class="value" id="hudTasks">0 / 28</span></span>
        <div class="character-status" id="characterStatus">
          <button class="char-nav-btn" id="charPrevBtn" disabled title="后退到上一个点">◀</button>
          <span id="characterStatusText">贵阳站</span>
          <button class="char-nav-btn" id="charNextBtn" title="前进到下一个点">▶</button>
        </div>
        <div class="layer-switcher">
          <button class="layer-btn active" data-layer="amap">高德</button>
          <button class="layer-btn" data-layer="satellite">卫星</button>
          <button class="layer-btn" data-layer="dark">深色</button>
        </div>
        <button class="header-search-btn" id="headerSearchBtn" title="搜索地点添加为站点">
          <span>🔍</span><span class="btn-label">搜索</span>
        </button>
        <button class="header-reset-btn" id="headerAmapKeyBtn" title="配置高德地图 API Key（国内推荐）">🔑 Key</button>
        <button class="header-reset-btn" id="exportBtn" title="导出完整 HTML 文件" onclick="exportToHTML()">💾 导出</button>
        <div class="progress-bar-wrap">
          <span class="label">进度</span>
          <div class="progress-bar"><div class="fill" id="progressFill" style="width: 0%"></div></div>
          <span class="pct" id="progressPct">0%</span>
        </div>
        <button class="header-toggle-btn" id="headerToggleBtn" title="隐藏导航栏">▲</button>
      </div>
    </div>
  </header>

  <button class="header-expand-btn" id="headerExpandBtn" title="展开导航栏">▼ 行程</button>

  <main class="app-main">
    <div id="map"></div>

    <!-- Route overview -->
    <div class="route-info" id="routeInfo">
      <div class="title">
        <span>行程路线</span>
        <button class="route-toggle-btn" id="routeToggleBtn" title="隐藏路线面板">✕</button>
      </div>
      <div class="route-info-content">
        <div class="route-list" id="routeList"></div>
      </div>
    </div>
    <div class="route-expand-tab" id="routeExpandTab">行程路线</div>

    <div class="toast" id="toast"></div>
    <!-- 移动端面板遮罩 & 浮动按钮 -->
    <div class="mobile-panel-overlay" id="mobilePanelOverlay"></div>
    <button class="mobile-fab route-fab" id="mobileRouteFab">☰ 路线</button>
    <button class="mobile-fab station-fab" id="mobileStationFab">📍 站点</button>


    <!-- Todo Side Panel -->
    <aside class="todo-panel" id="todoPanel">
      <div class="panel-header">
        <span class="node-badge" id="nodeBadge" title="点击修改站点编号">站点 · 01</span>
        <h2 id="panelTitle">站点名称</h2>
        <div class="panel-label-row">
          <label class="panel-label-lbl">标签</label>
          <input type="text" id="panelLabel" class="panel-label-input" placeholder="留空则用编号" maxlength="6" />
          <span class="panel-label-hint" id="panelLabelHint"></span>
        </div>
        <div class="meta" id="panelMeta">日期 · 简介</div>
        <div class="coord" id="panelCoord">坐标 · ——</div>
        <button class="panel-close" id="panelClose">✕</button>
      </div>

      <!-- 进度环 -->
      <div class="progress-ring-block">
        <div class="progress-ring">
          <svg viewBox="0 0 100 100">
            <defs>
              <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3a2818"/>
                <stop offset="50%" stop-color="#5e4a3a"/>
                <stop offset="100%" stop-color="#a8324a"/>
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="50" cy="50" r="42"/>
            <circle class="ring-fill" cx="50" cy="50" r="42"
                    stroke-dasharray="263.89"
                    stroke-dashoffset="263.89"/>
          </svg>
          <div class="ring-text">
            <div class="num" id="ringNum">0%</div>
            <div class="lbl">进度</div>
          </div>
        </div>
        <div class="progress-stats">
          <div class="stat done"><div class="lbl">已完成</div><div class="val" id="statDone">0</div></div>
          <div class="stat left"><div class="lbl">待办</div><div class="val" id="statPending">0</div></div>
        </div>
      </div>

      <div class="todo-list" id="todoList"></div>
      <div class="todo-toolbar" id="todoToolbar">
        <span class="count-hint" id="countHint"></span>
        <button class="clear-completed-btn" id="clearCompletedBtn" disabled>清除已完成</button>
      </div>
      <div class="todo-add-area">
        <div class="priority-selector">
          <button class="pri-btn" data-pri="high"><span class="pd"></span>高</button>
          <button class="pri-btn active" data-pri="normal"><span class="pd"></span>中</button>
          <button class="pri-btn" data-pri="low"><span class="pd"></span>低</button>
        </div>
        <div class="todo-input-row">
          <input type="text" class="todo-input" id="todoInput" placeholder="添加待办事项..." maxlength="100">
          <button class="todo-add-btn" id="todoAddBtn">+</button>
        </div>
      </div>

      <!-- 连线管理 -->
      <div class="panel-connections" id="panelConnections">
        <div class="pc-header">
          <span>连线管理</span>
          <span class="pc-hint" id="pcHint">选目标站点后点 + 添加</span>
        </div>
        <div class="pc-add">
          <select id="pcSelect" class="pc-select">
            <option value="">选择目标站点…</option>
          </select>
          <button id="pcAddBtn" class="pc-add-btn" title="添加连线">+ 连线</button>
        </div>
        <div class="pc-list" id="pcList"></div>
      </div>

      <!-- 删除站点 -->
      <div class="panel-danger" id="panelDanger">
        <button id="deleteMarkerBtn" class="panel-del-btn">🗑️ 删除此站点（连同所有连线）</button>
      </div>
    </aside>

    <!-- 右侧滑动把手 -->
    <div class="panel-side-slider" id="panelSideSlider" title="任务面板"></div>

    <!-- 搜索面板 -->
    <div class="search-panel" id="searchPanel">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索地点（景点/城市/地址）..." />
        <button class="search-close" id="searchCloseBtn" title="关闭">✕</button>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-hint">输入关键词，回车搜索<br><span style="opacity:0.75;font-size:10.5px;line-height:1.7;display:inline-block;margin-top:6px;">点顶部 🔑 配置高德地图 API Key 后即可搜索</span></div>
      </div>
    </div>

    <!-- 编辑模式横幅 -->
    <div class="edit-mode-banner" id="editModeBanner">
      <span>✏️ 编辑模式</span>
      <button id="exitEditModeBtn">完成</button>
    </div>

    <!-- 高德 Key 配置弹层（替代原生 prompt，手机端可用） -->
    <div class="key-dialog-backdrop" id="keyDialogBackdrop">
      <div class="key-dialog" id="keyDialog" role="dialog" aria-modal="true" aria-labelledby="keyDialogTitle">
        <div class="kd-title" id="keyDialogTitle">
          <span class="kd-icon">🔑</span>
          <span>配置高德 Key</span>
        </div>
        <div class="kd-status" id="keyDialogStatus"></div>
        <div class="kd-hint">
          申请地址：<a href="https://console.amap.com/dev/key/app" target="_blank" rel="noopener">https://console.amap.com/dev/key/app</a><br>
          选「Web 服务 API」类型，个人开发者有免费额度。key 存于本地浏览器（localStorage），导出文件时不带过去。
        </div>
        <label class="kd-label" for="keyDialogInput">API Key</label>
        <div class="kd-input-wrap">
          <input
            type="text"
            id="keyDialogInput"
            class="kd-input"
            placeholder="粘贴你的高德 Web 服务 key"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            inputmode="text"
          >
          <button type="button" class="kd-toggle" id="keyDialogToggle" title="显示/隐藏">👁</button>
        </div>
        <div class="kd-counter" id="keyDialogCounter">0 字符</div>
        <div class="kd-actions">
          <button type="button" class="kd-btn" id="keyDialogClearBtn">清除</button>
          <button type="button" class="kd-btn" id="keyDialogCancelBtn">取消</button>
          <button type="button" class="kd-btn primary" id="keyDialogSaveBtn">保存</button>
        </div>
      </div>
    </div>
  </main>

</div>

<script>

    },
    {
      id: 6, name: '丙安镇', date: '7.21-7.22', subtitle: '丙安村 · 古镇调研',
      lat: 28.4688, lng: 105.8295, color: '#6b4a26', coord: '28.47°N, 105.83°E',
      day: 5,
      todos: [
        { text: '前往丙安村调研', done: false, priority: 'high' },
        { text: '参观丙安古镇', done: false, priority: 'normal' },

    {

      lat: 26.554, lng: 106.785, color: '#a8324a', coord: '26.55°N, 106.79°E',
      day: 5,
      todos: [
        { text: '前往贵阳红飘带', done: false, priority: 'high' },
        { text: '参观长征数字科技艺术馆', done: false, priority: 'high' },
        { text: '体验全域行浸式数字演艺', done: false, priority: 'normal' },

      ]
    },
    {
      id: 7, name: '贵州凯里', date: '7.23', subtitle: '终点 · 州庆70周年调研',
      lat: 26.583, lng: 107.978, color: '#1f1408', coord: '26.58°N, 107.98°E',
      day: 6,
      todos: [
        { text: '前往凯里', done: false, priority: 'high' },
        { text: '参加黔东南苗族侗族自治州成立70周年庆', done: false, priority: 'high' },

      ]
    },
  ];
  // END_NODES_DEFAULT

  // 路线段定义（保持与原版完全一致）
  // BEGIN_ROUTE_SEGMENTS_DEFAULT
  const ROUTE_SEGMENTS = [
    [0, 1], // 贵阳站 → 遵义
    [1, 2], // 遵义 → 娄山关
    [2, 1], // 娄山关 → 遵义（返回）
    [1, 3], // 遵义 → 团结村
    [3, 4], // 团结村 → 四渡赤水纪念馆
    [4, 5], // 四渡赤水纪念馆 → 丙安镇
    [5, 1], [1, 6], [6, 7], // 丙安镇 → 遵义 → 贵阳·红飘带 → 贵州凯里
  ];
  // END_ROUTE_SEGMENTS_DEFAULT

  // ====== 状态 ======
  let activeNodeId = null;
  let nodeData = loadData() || JSON.parse(JSON.stringify(NODES_DEFAULT));
  let selectedPriority = 'normal';
  let map, markers = [], routeLines = [], glowLines = [];
  let distMarkers = [], segLines = [];
  let labelPlacementSegIdx = -1, labelPlacementHighlight = null, labelPlacementGuide = null;
  let longPressTimer = null, longPressSegIdx = -1;
  function measureLabel(text) {
    const span = document.createElement('span');
    span.className = 'dist-label';
    span.textContent = text;
    span.style.cssText = 'position:absolute;visibility:hidden;opacity:1;white-space:nowrap;';
    document.body.appendChild(span);
    const rect = span.getBoundingClientRect();
    const w = Math.ceil(rect.width) + 24;
    const h = Math.ceil(rect.height) + 14;
    document.body.removeChild(span);
    return [w, h];
  }

  let characterMarker = null;
  let characterNodeIndex = 0;
  let characterIsWalking = false;
  let walkCancelFlag = false;

  // ====== 持久化（保持原键名） ======
  function loadData() {
    try {
      const raw = localStorage.getItem('practice-route-todos-v1');
      if (!raw) return null;
      const data = JSON.parse(raw);
      // 防御：空数组等同于"没存过"，应回退到 NODES_DEFAULT，
      // 否则 `loadData() || ...` 会拿到空数组（truthy）导致 nodeData 变空。
      if (!Array.isArray(data) || data.length === 0) return null;
      data.forEach(node => {
        if (!node.date) node.date = '';
        if (!node.day) node.day = 1;
        if (node.todos) node.todos.forEach(t => {
          if (!t.priority) t.priority = 'normal';
        });
      });
      // 去重：标签、站点编号
      const seenLabel = new Set();
      const seenStation = new Set();
      data.forEach((node, i) => {
        // label 去重
        if (node.label) {
          const k = String(node.label).trim().toLowerCase();
          if (!k || seenLabel.has(k)) { delete node.label; }
          else seenLabel.add(k);
        }
        // stationNo 去重（去前导 0）
        if (node.stationNo != null) {
          const v = String(parseInt(node.stationNo, 10));
          if (v === 'NaN' || seenStation.has(v)) { delete node.stationNo; }
          else seenStation.add(v);
        }
      });
      return data;
    } catch { return null; }
  }
  function saveData() {
    try { localStorage.setItem('practice-route-todos-v1', JSON.stringify(nodeData)); } catch (_) {}
  }


  function loadCharacterIndex() {
    try {
      const v = localStorage.getItem('practice-character-index-v1');
      if (v !== null) {
        const n = parseInt(v, 10);
        if (n >= 0 && n < nodeData.length) return n;
      }
    } catch (_) {}
    return computeCharacterIndex();
  }
  function saveCharacterIndex(idx) {
    try { localStorage.setItem('practice-character-index-v1', String(idx)); } catch (_) {}
  }

  function computeCharacterIndex() {
    if (nodeData.length === 0) return 0;
    for (let i = 0; i < nodeData.length; i++) {
      if (!isNodeAllDone(i)) return i;
    }
    return nodeData.length - 1;
  }
  function isNodeAllDone(idx) {
    const todos = nodeData[idx].todos;
    return todos.length > 0 && todos.every(t => t.done);
  }

  // ====== Toast ======
  const toastEl = document.getElementById('toast');
  const mobileOverlay = document.getElementById('mobilePanelOverlay');
  let toastTimer = null;
  function showToast(msg, kind) {
    if (toastTimer) clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.remove('show', 'success', 'warn');
    if (kind === 'success') toastEl.classList.add('success');
    if (kind === 'warn') toastEl.classList.add('warn');
    // double rAF to retrigger
    requestAnimationFrame(() => {
      toastEl.classList.add('show');
    });
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
  }

  // ====== 红星爆发（多层红色光圈扩散 + 卫星红星飞溅 + 光芒射线 + 红色光柱） ======
  function spawnInkBurst(latLng) {
    const container = document.getElementById('map');
    const point = map.latLngToContainerPoint(latLng);

    // 4 层红色光圈依次扩散（原 6 层，减少以提升性能）
    for (let i = 0; i < 4; i++) {
      const ring = document.createElement('div');
      ring.style.cssText = 'position:absolute;width:10px;height:10px;border-radius:50%;'
        + 'background:radial-gradient(circle,rgba(200,50,74,0.85)0%,rgba(200,50,74,0)70%);'
        + 'pointer-events:none;z-index:998;transform-origin:center;will-change:transform,opacity;'
        + 'left:' + (point.x - 5) + 'px;top:' + (point.y - 5) + 'px;'
        + 'animation:starRingBurst 1.5s cubic-bezier(0.4,0,0.2,1) forwards;'
        + 'animation-delay:' + (i * 0.1) + 's;';
      container.appendChild(ring);
      setTimeout(() => ring.remove(), 2200);
    }

    // 红色光柱
    const column = document.createElement('div');
    column.className = 'star-column';
    column.style.left = point.x + 'px';
    column.style.top = point.y + 'px';
    container.appendChild(column);
    setTimeout(() => column.remove(), 1100);

    // 光芒射线（4条，向外放射；原 8 条）
    for (let i = 0; i < 4; i++) {
      const ray = document.createElement('div');
      const angle = (i / 4) * Math.PI * 2;
      const len = 30 + Math.random() * 25;
      ray.style.cssText = 'position:absolute;width:2px;height:' + len + 'px;'
        + 'background:linear-gradient(0deg,rgba(200,50,74,0.9)0%,rgba(200,50,74,0)100%);'
        + 'pointer-events:none;z-index:996;border-radius:1px;'
        + 'left:' + point.x + 'px;top:' + point.y + 'px;'
        + 'transform-origin:center bottom;'
        + 'transform:translate(-50%,-100%) rotate(' + (angle * 180 / Math.PI) + 'deg);'
        + 'animation:starRayPulse 0.8s cubic-bezier(0.16,1,0.3,1) forwards;'
        + 'animation-delay:' + (0.02 + Math.random() * 0.08) + 's;';
      container.appendChild(ray);
      setTimeout(() => ray.remove(), 1000);
    }

    // 卫星小红星（8个；原 16 个）
    const N = 8;
    for (let i = 0; i < N; i++) {
      const drop = document.createElement('div');
      drop.className = 'burst-star';
      const sz = 3 + Math.random() * 5;
      drop.style.width = sz + 'px';
      drop.style.height = sz + 'px';
      drop.style.left = point.x + 'px';
      drop.style.top = point.y + 'px';
      const angle = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
      const dist = 22 + Math.random() * 45;
      drop.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      drop.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      drop.style.animationDelay = (0.03 + Math.random() * 0.12) + 's';
      container.appendChild(drop);
      setTimeout(() => drop.remove(), 1300);
    }
  }

  // ====== 路径查找 BFS ======
  function findPath(fromIdx, toIdx) {
    if (fromIdx === toIdx) return [fromIdx];
    const adj = {};
    ROUTE_SEGMENTS.forEach(([a, b]) => {
      if (!adj[a]) adj[a] = [];
      if (!adj[b]) adj[b] = [];
      if (!adj[a].includes(b)) adj[a].push(b);
      if (!adj[b].includes(a)) adj[b].push(a);
    });
    const queue = [[fromIdx]];
    const visited = new Set([fromIdx]);
    while (queue.length > 0) {
      const path = queue.shift();
      const cur = path[path.length - 1];
      if (cur === toIdx) return path;
      for (const nb of (adj[cur] || [])) {
        if (!visited.has(nb)) {
          visited.add(nb);
          queue.push([...path, nb]);
        }
      }
    }
    return null;
  }

  function initCharacter() {
    characterNodeIndex = loadCharacterIndex();
    if (nodeData.length === 0) { updateCharacterStatus(); return; }
    const node = nodeData[characterNodeIndex];
    const pos = L.latLng(node.lat, node.lng);
    characterMarker = L.marker(pos, {
      icon: createCharacterIcon(),
      zIndexOffset: 700,
      interactive: false,
    }).addTo(map);
    // 注入当前节点色（光柱用），idle 散开态已在图标 HTML 中默认带上
    const el0 = characterMarker.getElement();
    const wrap0 = el0 ? el0.querySelector('.character-wrap') : null;
    if (wrap0) wrap0.style.setProperty('--cc', hexToRgbStr(node.color));
    updateCharacterStatus();
  }

  function updateCharacterStatus() {
    if (nodeData.length === 0) {
      document.getElementById('characterStatusText').textContent = '尚无站点';
      document.getElementById('charPrevBtn').disabled = true;
      document.getElementById('charNextBtn').disabled = true;
      return;
    }
    const node = nodeData[characterNodeIndex];
    document.getElementById('characterStatusText').textContent = node.name;
    document.getElementById('charPrevBtn').disabled = (characterNodeIndex <= 0 || characterIsWalking);
    document.getElementById('charNextBtn').disabled = (characterNodeIndex >= nodeData.length - 1 || characterIsWalking);
    markers.forEach((m, i) => {
      const root = m.getElement()?.querySelector('.station-marker');
      if (!root) return;
      if (i === characterNodeIndex) root.classList.add('current');
      else root.classList.remove('current');
    });
  }

  async function moveCharacterTo(targetIdx) {
    if (characterIsWalking) return;
    if (targetIdx < 0 || targetIdx >= nodeData.length) return;
    if (targetIdx === characterNodeIndex) {
      const node = nodeData[targetIdx];
      map.flyTo([node.lat, node.lng], Math.max(map.getZoom(), 9), { duration: 0.6 });
      return;
    }
    const path = findPath(characterNodeIndex, targetIdx);
    if (!path || path.length < 2) {
      showToast('无法到达目标站点', 'warn');
      return;
    }
    for (let i = 1; i < path.length; i++) {
      showToast(`📍 前往 ${nodeData[path[i]].name}`);
      await animateCharacterWalk(path[i - 1], path[i]);
    }
    updateCharacterStatus();
  }

  function animateCharacterWalk(fromNodeIdx, toNodeIdx) {
    return new Promise(resolve => {
      if (characterIsWalking) { resolve(); return; }
      characterIsWalking = true;
      walkCancelFlag = false;

      const fromNode = nodeData[fromNodeIdx];
      const toNode = nodeData[toNodeIdx];
      const fromLatLng = L.latLng(fromNode.lat, fromNode.lng);
      const toLatLng = L.latLng(toNode.lat, toNode.lng);
      // ===== 基于距离的走路时长（速度与里程成正比）=====
      const distKm = fromLatLng.distanceTo(toLatLng) / 1000;
      const duration = Math.max(1200, Math.min(5500, 1200 + distKm * 22));
      const startTime = performance.now();

      const el = characterMarker.getElement();
      const wrap = el ? el.querySelector('.character-wrap') : null;

      // 朝向计算
      const dLon = (toNode.lng - fromNode.lng) * Math.PI / 180;
      const lat1 = fromNode.lat * Math.PI / 180;
      const lat2 = toNode.lat * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
      const bearing = Math.atan2(y, x) * 180 / Math.PI;
      // 尾迹位于墨点左侧（right:100%），需使其指向运动方向的反向（身后）
      // bearing 0°=北，尾迹需指向南（180°），即 roll = bearing - 90
      if (wrap) {
        wrap.style.transform = `rotate(${bearing - 90}deg)`;
      }

      const mapEl = document.getElementById('map');
      if (mapEl) mapEl.classList.add('tilted');

      // 让目标城市"先暗"
      const targetEl = markers[toNodeIdx]?.getElement();
      const targetMarker = targetEl?.querySelector('.station-marker');
      if (targetMarker) targetMarker.classList.add('lighting-up');

      // 视角先飞到起点并缩放到合适层级，随后由 step 持续跟随墨点
      const followZoom = Math.max(map.getZoom(), 9);
      map.flyTo(fromLatLng, followZoom, { duration: 0.25, easeLinearity: 0.3 });

      const walkStartDelay = 300;
      let splashFrameCounter = 0;
      let lastPanTime = 0;
      setTimeout(() => {
        if (walkCancelFlag) { cleanupAndFinish(); return; }
        if (wrap) {
          wrap.classList.remove('idle');
          wrap.classList.add('walking');
        }
        requestAnimationFrame(step);
      }, walkStartDelay);

      function step(now) {
        if (walkCancelFlag) { cleanupAndFinish(); return; }
        const elapsed = now - startTime - walkStartDelay;
        const t = Math.max(0, Math.min(elapsed / duration, 1));
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

        const lat = fromLatLng.lat + (toLatLng.lat - fromLatLng.lat) * eased;
        const lng = fromLatLng.lng + (toLatLng.lng - fromLatLng.lng) * eased;
        const curLatLng = L.latLng(lat, lng);
        characterMarker.setLatLng(curLatLng);

        // 视角跟随：限制 panTo 频率到 10fps，避免每帧触发 Leaflet 重绘
        if (now - lastPanTime > 100) {
          lastPanTime = now;
          map.panTo(curLatLng, { animate: false });
        }

        // 每 10 帧在红星身后生成 1 个红色星点飞溅粒子
        splashFrameCounter++;
        if (splashFrameCounter % 10 === 0) {
          const point = map.latLngToContainerPoint(curLatLng);
          const splash = document.createElement('div');
          splash.className = 'star-sparkle';
          const sz = 2 + Math.random() * 3;
          splash.style.width = sz + 'px';
          splash.style.height = sz + 'px';
          splash.style.left = point.x + 'px';
          splash.style.top = point.y + 'px';
          const baseAngle = (bearing - 90) * Math.PI / 180;
          const splashAngle = baseAngle + Math.PI + (Math.random() - 0.5) * 1.2;
          const splashDist = 12 + Math.random() * 28;
          splash.style.setProperty('--dx', Math.cos(splashAngle) * splashDist + 'px');
          splash.style.setProperty('--dy', Math.sin(splashAngle) * splashDist + 'px');
          splash.style.setProperty('--sd', (0.6 + Math.random() * 0.5) + 's');
          mapEl.appendChild(splash);
          setTimeout(() => splash.remove(), 900);
        }

        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          cleanupAndFinish();
        }
      }

      function cleanupAndFinish() {
        if (walkCancelFlag) {
          if (wrap) { wrap.style.transform = ''; wrap.classList.remove('walking'); wrap.classList.add('idle'); }
          characterIsWalking = false;
          resolve();
          return;
        }
        if (wrap) wrap.classList.remove('walking');
        if (wrap) {
          wrap.classList.add('arrive');
          setTimeout(() => wrap.classList.remove('arrive'), 700);
        }
        if (mapEl) mapEl.classList.remove('tilted');

        // 点亮目标城市
        if (targetMarker) {
          targetMarker.classList.remove('lighting-up');
          targetMarker.classList.add('flash');
          setTimeout(() => targetMarker.classList.remove('flash'), 1100);
        }

        characterMarker.setLatLng(toLatLng);
        characterNodeIndex = toNodeIdx;
        saveCharacterIndex(characterNodeIndex);
        // 到达节点：注入该节点色 + 切回散开态（激活当前位置光柱）
        const arrivedNode = nodeData[toNodeIdx];
        if (wrap) {
          wrap.style.transform = '';   // 清除行走朝向旋转，让光柱保持垂直
          wrap.style.setProperty('--cc', hexToRgbStr(arrivedNode.color));
          wrap.classList.add('idle');
        }
        updateCharacterStatus();
        characterIsWalking = false;
        resolve();
      }
    });
  }

  async function checkAndAdvanceCharacter() {
    if (characterIsWalking) return;
    while (characterNodeIndex < nodeData.length && isNodeAllDone(characterNodeIndex)) {
      const nextIdx = characterNodeIndex + 1;
      if (nextIdx >= nodeData.length) {
        if (isNodeAllDone(nodeData.length - 1)) {
          showToast('🎉 全部指令执行完成', 'success');
        }
        break;
      }
      const node = nodeData[characterNodeIndex];
      showToast(`✅ ${node.name} 完成 · 前往 ${nodeData[nextIdx].name}`, 'success');
      spawnInkBurst(L.latLng(node.lat, node.lng));
      const path = findPath(characterNodeIndex, nextIdx);
      if (path) {
        for (let i = 1; i < path.length; i++) {
          await animateCharacterWalk(path[i - 1], path[i]);
        }
      }
    }
  }

  // ====== 距离标识交互（双击/长按连线 → 移动距离标签到线上任意点） ======
  function closestPointOnSegment(aLL, bLL, pLL) {
    const a = map.latLngToContainerPoint(aLL);
    const b = map.latLngToContainerPoint(bLL);
    const p = map.latLngToContainerPoint(pLL);
    const abx = b.x - a.x, aby = b.y - a.y;
    const apx = p.x - a.x, apy = p.y - a.y;
    const ab2 = abx * abx + aby * aby;
    if (ab2 === 0) return aLL;
    let t = (apx * abx + apy * aby) / ab2;
    t = Math.max(0, Math.min(1, t));
    return map.containerPointToLatLng({ x: a.x + abx * t, y: a.y + aby * t });
  }

  function enterPlacementMode(segIdx) {
    exitPlacementMode();
    labelPlacementSegIdx = segIdx;
    const [fi, ti] = ROUTE_SEGMENTS[segIdx];
    labelPlacementHighlight = L.polyline([
      [nodeData[fi].lat, nodeData[fi].lng],
      [nodeData[ti].lat, nodeData[ti].lng]
    ], {
      color: '#5e4a3a', weight: 5, opacity: 0.85, dashArray: '6 4', interactive: false,
    }).addTo(map);
    labelPlacementGuide = L.circleMarker([0, 0], {
      radius: 6, color: '#5e4a3a', fillColor: '#5e4a3a',
      fillOpacity: 0.5, weight: 2, opacity: 0.8, interactive: false,
    }).addTo(map);
    labelPlacementGuide.setLatLng(distMarkers[segIdx].getLatLng());
    labelPlacementGuide._moveHandler = function (e) {
      if (labelPlacementSegIdx < 0) return;
      const [fi2, ti2] = ROUTE_SEGMENTS[labelPlacementSegIdx];
      const snap = closestPointOnSegment(
        L.latLng(nodeData[fi2].lat, nodeData[fi2].lng),
        L.latLng(nodeData[ti2].lat, nodeData[ti2].lng), e.latlng
      );
      labelPlacementGuide.setLatLng(snap);
    };
    map.on('mousemove', labelPlacementGuide._moveHandler);
  }

  function exitPlacementMode() {
    if (labelPlacementHighlight) { map.removeLayer(labelPlacementHighlight); labelPlacementHighlight = null; }
    if (labelPlacementGuide) {
      if (labelPlacementGuide._moveHandler) map.off('mousemove', labelPlacementGuide._moveHandler);
      map.removeLayer(labelPlacementGuide); labelPlacementGuide = null;
    }
    labelPlacementSegIdx = -1;
    map.getContainer().style.cursor = '';
  }

  function bindSegLineEvents() {
    segLines.forEach(line => {
      // 悬浮高亮：提示用户可长按进入拖动模式 + 同步显示所有距离标识
      line.on('mouseover', function () {
        this.setStyle({ color: '#5e4a3a', opacity: 0.45, weight: 4, dashArray: '6 3' });
        if (Array.isArray(distMarkers)) {
          distMarkers.forEach(function (dm) {
            var el = dm.getElement();
            if (el) { var s = el.querySelector('.dist-label'); if (s) s.classList.add('show'); }
          });
        }
      });
      line.on('mouseout', function () {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        this.setStyle({ color: 'transparent', opacity: 0.001, weight: 50 });
        if (labelPlacementSegIdx < 0 && Array.isArray(distMarkers)) {
          distMarkers.forEach(function (dm) {
            var el = dm.getElement();
            if (el) { var s = el.querySelector('.dist-label'); if (s) s.classList.remove('show'); }
          });
        }
      });
      // 长按（≥600ms）进入放置模式
      line.on('mousedown', function () {
        longPressSegIdx = this._segIdx;
        longPressTimer = setTimeout(() => {
          if (longPressSegIdx >= 0) {
            enterPlacementMode(longPressSegIdx);
            map.getContainer().style.cursor = 'crosshair';
          }
          longPressTimer = null;
        }, 600);
      });
      line.on('mouseup', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });
      // 放置模式下点击任意 segLine 完成放置（不再要求匹配 segIdx，点击即放）
      line.on('click', function (e) {
        if (labelPlacementSegIdx < 0) return;
        L.DomEvent.stopPropagation(e);
        const [fi, ti] = ROUTE_SEGMENTS[labelPlacementSegIdx];
        const snap = closestPointOnSegment(
          L.latLng(nodeData[fi].lat, nodeData[fi].lng),
          L.latLng(nodeData[ti].lat, nodeData[ti].lng), e.latlng
        );
        distMarkers[labelPlacementSegIdx].setLatLng(snap);
        exitPlacementMode();
      });
    });
  }

  // ====== 地图初始化 ======
  function initMap() {
    map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
      doubleClickZoom: false,
      minZoom: 5,
      maxZoom: 18,
    }).setView([27.6, 106.8], 7);

    const amapLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
      attribution: '&copy; 高德地图',
      subdomains: ['1', '2', '3', '4'],
      maxZoom: 18,
      keepBuffer: 4,
      updateWhenIdle: true,
      updateInterval: 200,
    });
    const satBase = L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
      attribution: '&copy; 高德地图',
      subdomains: ['1', '2', '3', '4'],
      maxZoom: 18,
      keepBuffer: 4,
      updateWhenIdle: true,
    });
    const satLabels = L.tileLayer('https://wprd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&style=8&x={x}&y={y}&z={z}', {
      subdomains: ['1', '2', '3', '4'],
      maxZoom: 18,
      keepBuffer: 10,
      updateWhenIdle: false,
    });
    const satelliteLayer = L.layerGroup([satBase, satLabels]);
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
      keepBuffer: 4,
      updateWhenIdle: true,
    });

    let currentLayer = amapLayer;
    amapLayer.addTo(map);

    const layers = { amap: amapLayer, satellite: satelliteLayer, dark: darkLayer };
    document.querySelectorAll('.layer-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        map.removeLayer(currentLayer);
        currentLayer = layers[btn.dataset.layer];
        currentLayer.addTo(map);
      });
    });

    // 路线主线：青色流动光带
    // 每段独立绘制折线，不相邻段不会连出多余连线
    const routeCoords = [];
    ROUTE_SEGMENTS.forEach(([fi, ti]) => {
      const segCoords = [[nodeData[fi].lat, nodeData[fi].lng], [nodeData[ti].lat, nodeData[ti].lng]];
      routeCoords.push([nodeData[fi].lat, nodeData[fi].lng], [nodeData[ti].lat, nodeData[ti].lng]);
      const gl = L.polyline(segCoords, {
        color: '#5e4a3a', weight: 6, opacity: 0.12, lineCap: 'round',
      }).addTo(map);
      glowLines.push(gl);
      const rl = L.polyline(segCoords, {
        color: '#4a3020', weight: 1.2, opacity: 0.65,
        dashArray: '4 4', lineCap: 'round', lineJoin: 'round', className: 'ink-route',
      }).addTo(map);
      routeLines.push(rl);
    });

    segLines = [];
    ROUTE_SEGMENTS.forEach(([fi, ti]) => {
      const line = L.polyline([
        [nodeData[fi].lat, nodeData[fi].lng],
        [nodeData[ti].lat, nodeData[ti].lng]
      ], {
        color: 'transparent', weight: 50, opacity: 0.001,
        interactive: true, bubblingMouseEvents: false,
      }).addTo(map);
      line._segIdx = segLines.length;
      segLines.push(line);
    });

    distMarkers = [];
    ROUTE_SEGMENTS.forEach(([fi, ti]) => {
      const fn = nodeData[fi], tn = nodeData[ti];
      const fromLL = L.latLng(fn.lat, fn.lng);
      const toLL = L.latLng(tn.lat, tn.lng);
      const distKm = Math.round(fromLL.distanceTo(toLL) / 1000);
      const mid = L.latLng((fn.lat + tn.lat) / 2, (fn.lng + tn.lng) / 2);
      const innerHTML = `<span class="dist-km">${distKm} KM</span><span class="dl-sep">·</span><span>${fn.name}</span> <span class="dl-sep">→</span> <span>${tn.name}</span>`;
      // 测量尺寸时仍用纯文本
      const text = `${distKm} KM · ${fn.name} → ${tn.name}`;
      const [w, h] = measureLabel(text);
      const distIcon = L.divIcon({
        html: `<span class="dist-label">${innerHTML}</span>`,
        className: 'dist-label-wrap',
        iconSize: [w, h],
        iconAnchor: [w / 2, h / 2],
      });
      const dm = L.marker(mid, {
        icon: distIcon, draggable: false, autoPan: false, zIndexOffset: 1000,
      });
      dm.addTo(map);
      distMarkers.push(dm);
    });

    bindSegLineEvents();
    // 放置模式下点击地图空白区域直接完成放置（无法取消，ESC 键可退出）
    map.on('click', function (e) {
      if (labelPlacementSegIdx < 0) return;
      const [fi, ti] = ROUTE_SEGMENTS[labelPlacementSegIdx];
      const snap = closestPointOnSegment(
        L.latLng(nodeData[fi].lat, nodeData[fi].lng),
        L.latLng(nodeData[ti].lat, nodeData[ti].lng), e.latlng
      );
      distMarkers[labelPlacementSegIdx].setLatLng(snap);
      exitPlacementMode();
    });

    // ESC 键退出放置模式（唯一取消途径）
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && labelPlacementSegIdx >= 0) {
        exitPlacementMode();
      }
    });

    function showDistLabels() {
      distMarkers.forEach(dm => {
        const el = dm.getElement();
        if (el) { const s = el.querySelector('.dist-label'); if (s) s.classList.add('show'); }
      });
    }
    function hideDistLabels() {
      if (labelPlacementSegIdx >= 0) return;
      distMarkers.forEach(dm => {
        const el = dm.getElement();
        if (el) {
          const s = el.querySelector('.dist-label');
          if (s) s.classList.remove('show');
        }
      });
    }
    glowLines.forEach(gl => { gl.on('mouseover', showDistLabels); gl.on('mouseout', hideDistLabels); });
    routeLines.forEach(rl => { rl.on('mouseover', showDistLabels); rl.on('mouseout', hideDistLabels); });
    segLines.forEach(l => { l.on('mouseover', showDistLabels); l.on('mouseout', hideDistLabels); });

    // 兜底：Leaflet 的 polyline mouseout 在滚轮缩放 / 拖动 / 快速切换时不一定触发，
    // 一旦卡住 dist-label 就永久显示。所以额外监听地图层面的"用户离开"事件来强制 hide。
    map.on('movestart', hideDistLabels);
    map.on('zoomstart', hideDistLabels);
    map.getContainer().addEventListener('mouseleave', hideDistLabels);

    // 站点标记 + 光柱
    nodeData.forEach((node, i) => {
      const marker = createMarker(node, i);
      marker.addTo(map);
      const el = marker.getElement();
      if (el) el.dataset.nodeId = String(node.id);
      markers.push(marker);
    });

    initCharacter();

    if (routeCoords.length > 0) {
      map.fitBounds(routeCoords, { padding: [80, 80, 420, 100] });
    } else {
      map.setView([27.6, 106.8], 7);
    }

    map.on('moveend', () => updateMarkersDoneState());
    map.on('zoomend', () => updateMarkersDoneState());
  }

  // ====== 预加载瓦片：提前把整个路线范围的所有瓦片下载到浏览器缓存 ======
  function preloadRouteTiles(layer, coords) {
    if (!layer || !coords || !coords.length) return;
    const urlTemplate = layer._url;
    if (!urlTemplate) return;

    // 计算路线范围的经纬度边界
    let minLat = Infinity, maxLat = -Infinity, minLng = Infinity, maxLng = -Infinity;
    coords.forEach(([lat, lng]) => {
      if (lat < minLat) minLat = lat;
      if (lat > maxLat) maxLat = lat;
      if (lng < minLng) minLng = lng;
      if (lng > maxLng) maxLng = lng;
    });
    // 扩展 30% 边界，大幅提升预加载覆盖率
    const latPad = (maxLat - minLat) * 0.30;
    const lngPad = (maxLng - minLng) * 0.30;
    const bounds = {
      south: minLat - latPad,
      north: maxLat + latPad,
      west: minLng - lngPad,
      east: maxLng + lngPad,
    };

    // 预加载 zooms 7-14（覆盖所有可能用到的层级）
    const zooms = [7, 8, 9, 10, 11, 12, 13, 14];
    const subdomains = layer.options.subdomains || ['1', '2', '3', '4'];
    let todo = 0;

    zooms.forEach(z => {
      const nwTile = latLngToTile(bounds.north, bounds.west, z);
      const seTile = latLngToTile(bounds.south, bounds.east, z);
      const n = Math.pow(2, z);

      for (let y = nwTile.y; y <= seTile.y; y++) {
        for (let x = nwTile.x; x <= seTile.x; x++) {
          const tx = ((x % n) + n) % n;
          const ty = y;
          if (ty < 0 || ty >= n) continue;
          todo++;
          const idx = (todo % (Array.isArray(subdomains) ? subdomains.length : 1));
          const s = Array.isArray(subdomains) ? subdomains[idx] : subdomains;
          let url = urlTemplate
            .replace('{s}', s)
            .replace('{x}', tx)
            .replace('{y}', ty)
            .replace('{z}', z);
          // CARTO dark layer uses {r} for retina
          url = url.replace('{r}', '');
          const img = new Image();
          img.src = url;
        }
      }
    });
  }

  function latLngToTile(lat, lng, z) {
    const n = Math.pow(2, z);
    const x = Math.floor((lng + 180) / 360 * n);
    const latRad = lat * Math.PI / 180;
    const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
    return { x, y };
  }

  // ====== hex → rgb triplet（用于 CSS var 注入） ======
  function hexToRgbStr(hex) {
    if (!hex) return '58, 40, 24';
    let h = hex.replace('#', '');
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `${r}, ${g}, ${b}`;
  }

  // ====== 站点标记重做 ======
  function updateMarkersDoneState() {
    markers.forEach((m, i) => {
      const el = m.getElement();
      if (!el) return;
      const root = el.querySelector('.station-marker');
      if (!root) return;
      if (isNodeAllDone(i)) root.classList.add('done-all');
      else root.classList.remove('done-all');
    });

  function createMarker(node, index) {
    // 优先级：用户标签 > 用户站点编号 > 默认 idx+1
    let labelText;
    if (node.label && node.label.trim()) {
      labelText = node.label.trim();
    } else if (node.stationNo != null) {
      labelText = String(node.stationNo);
    } else {
      labelText = String(index + 1).padStart(2, '0');
    }
    const html = `
      <div class="station-marker" data-node-idx="${index}">
        <div class="sm-spin"></div>
        <div class="sm-spin inner"></div>
        <div class="sm-core">
          ${escapeHtml(labelText)}
        </div>
        <div class="sm-ring"></div>
        <div class="sm-del" title="编辑模式：删除此站点">✕</div>
      </div>
    `;
    const icon = L.divIcon({
      html: html,
      className: 'custom-div-icon',
      iconSize: [44, 44],
      iconAnchor: [22, 22],
    });
    const marker = L.marker([node.lat, node.lng], { icon: icon });
    marker.on('click', () => {
      map.flyTo([node.lat, node.lng], Math.max(map.getZoom(), 10), { duration: 0.6 });
      setTimeout(() => openNode(node.id), 400);
    });
    return marker;
  }

  // ====== 路线信息面板 ======

  // ====== 站点面板 ======
  const todoPanel = document.getElementById('todoPanel');
  const panelTitle = document.getElementById('panelTitle');
  const panelMeta = document.getElementById('panelMeta');
  const panelCoord = document.getElementById('panelCoord');
  const nodeBadge = document.getElementById('nodeBadge');
  const todoList = document.getElementById('todoList');
  const todoInput = document.getElementById('todoInput');
  const todoAddBtn = document.getElementById('todoAddBtn');

  function getNodeBadgeDisplayText(node, idx) {
    const label = node.label && node.label.trim();
    if (label) return label;
    if (node.stationNo != null) return `站点 · ${node.stationNo}`;
    return `站点 · ${String(idx + 1).padStart(2, '0')}`;
  }

  function openNode(id) {
    activeNodeId = id;
    const node = nodeData.find(n => n.id === id);
    if (!node) return;

    panelTitle.textContent = node.name;
    panelMeta.textContent = `${node.date} · ${node.subtitle}`;
    panelCoord.textContent = `COORD · ${node.coord}`;
    const idx = nodeData.findIndex(n => n.id === id);
    nodeBadge.textContent = getNodeBadgeDisplayText(node, idx);
    nodeBadge.style.color = node.color;
    nodeBadge.style.background = `${node.color}1a`;

    // 填充站点代号输入框
    const labelInput = document.getElementById('panelLabel');
    const labelHint = document.getElementById('panelLabelHint');
    if (labelInput) {
      labelInput.value = node.label || '';
      labelInput.classList.remove('invalid');
    }
    if (labelHint) {
      labelHint.classList.remove('error');
      labelHint.textContent = node.label ? `✓ ${node.label}` : '默认编号';
    }

    // 填充连线管理
    populateConnections(idx);

    // 站点编号点击编辑：徽章变输入框 + ✓/✕ 按钮，必须点按钮才提交
    nodeBadge.onclick = (e) => {
      e.stopPropagation();
      // 已经在编辑态时，徽章整体点击不再进入新一轮
      if (nodeBadge.classList.contains('editing')) return;
      const idx = nodeData.findIndex(n => n.id === activeNodeId);
      if (idx < 0) return;
      const oldText = nodeData[idx].stationNo != null ? String(nodeData[idx].stationNo) : String(idx + 1).padStart(2, '0');
      nodeBadge.classList.add('editing');
      nodeBadge.innerHTML =
        '<span class="nb-prefix">站点 ·</span>' +
        '<input class="nb-input" type="text" inputmode="numeric" maxlength="2" />' +
        '<button class="nb-btn ok"     title="确认">✓</button>' +
        '<button class="nb-btn cancel" title="取消">✕</button>';
      const inp = nodeBadge.querySelector('.nb-input');
      const okBtn = nodeBadge.querySelector('.nb-btn.ok');
      const cancelBtn = nodeBadge.querySelector('.nb-btn.cancel');
      inp.value = oldText;
      inp.focus();
      inp.select();

      let done = false;
      const finish = (commit) => {
        if (done) return;
        done = true;
        nodeBadge.classList.remove('editing');
        if (!commit) {
          // 取消
          const idx = nodeData.findIndex(n => n.id === activeNodeId);
          nodeBadge.textContent = idx >= 0 ? getNodeBadgeDisplayText(nodeData[idx], idx) : `站点 · ${oldText}`;
          return;
        }
        // ===== 提交校验 =====
        const raw = inp.value.trim();
        if (!/^\d+$/.test(raw)) {
          showNbError('只能是数字');
          return;
        }
        const num = parseInt(raw, 10);
        if (num < 0 || num > 99) {
          showNbError('范围 0-99');
          return;
        }
        if (num < nodeData.length) {
          // 在数组范围内：把当前节点移动到 num-1 位置
          // 同时清掉自己/目标的 stationNo，移动后按 idx 走默认编号
          const targetIdx = num - 1;
          delete nodeData[idx].stationNo;
          delete nodeData[targetIdx].stationNo;
          if (targetIdx === idx) {
            // 目标就是当前位置：只清掉自定义编号，立即刷新徽章
            saveData();
            openNode(nodeData[idx].id);
          } else {
            swapNodesByIndex(idx, targetIdx);
          }
        } else {
          // 超出数组范围：把"显示的编号"存到 stationNo 字段
          // - 数组位置不动
          // - ROUTE_SEGMENTS 不动
          // - 徽章 / marker 圆圈直接显示 num
          nodeData[idx].stationNo = num;
          if (nodeBadge) nodeBadge.textContent = getNodeBadgeDisplayText(nodeData[idx], idx);
          const m = markers[idx];
          const core = m?.getElement()?.querySelector('.station-marker .sm-core');
          if (core) core.textContent = String(num);
          saveData();
        }
      };

      // 错误提示：抖动 + 临时把"站点·"换成红色错误文案
      function showNbError(msg, focusIdx) {
        nodeBadge.classList.add('invalid-shake');
        setTimeout(() => nodeBadge.classList.remove('invalid-shake'), 350);
        // 不动 nodeData；只是把徽章临时换成错误提示，0.9s 后回弹
        const oldBg = nodeBadge.style.background;
        nodeBadge.style.background = 'rgba(192,57,43,0.12)';
        nodeBadge.textContent = `✕ ${msg}`;
        setTimeout(() => {
          // 还原为编辑态（恢复原值 + ✓/✕ 按钮）
          if (nodeBadge.classList.contains('editing')) {
            // 用户可能还点着什么，避免误重画
            return;
          }
          const idx = nodeData.findIndex(n => n.id === activeNodeId);
          nodeBadge.style.background = oldBg;
          nodeBadge.textContent = idx >= 0 ? getNodeBadgeDisplayText(nodeData[idx], idx) : `站点 · ${oldText}`;
        }, 900);
        if (focusIdx != null) {
          // 顺手把被占用的那个 marker 闪一下，方便用户看冲突
          const m = markers[focusIdx];
          if (m) {
            const root = m.getElement()?.querySelector('.station-marker');
            if (root) {
              root.classList.add('conflict-flash');
              setTimeout(() => root.classList.remove('conflict-flash'), 900);
            }
          }
        }
      }

      okBtn.addEventListener('click', (ev) => { ev.stopPropagation(); finish(true); });
      cancelBtn.addEventListener('click', (ev) => { ev.stopPropagation(); finish(false); });
      // 阻止徽章上点击冒泡到 panel 关闭
      [inp, okBtn, cancelBtn].forEach(el => el.addEventListener('click', e => e.stopPropagation()));

      // 边输边去前导 0：用户输 "01" → 变成 "1"
      inp.addEventListener('input', () => {
        const v = inp.value;
        if (v && v.length > 1 && v.startsWith('0')) {
          const trimmed = v.replace(/^0+/, '') || '0';
          const pos = inp.selectionStart - (v.length - trimmed.length);
          inp.value = trimmed;
          inp.setSelectionRange(pos, pos);
        }
      });

      inp.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter')  { ev.preventDefault(); finish(true); }
        if (ev.key === 'Escape') { ev.preventDefault(); finish(false); }
        // 限制只输数字
        if (ev.key.length === 1 && !/\d/.test(ev.key)) ev.preventDefault();
      });
    };

    markers.forEach((m, i) => {
      const root = m.getElement()?.querySelector('.station-marker');
      if (!root) return;
      root.classList.toggle('active', nodeData[i].id === id);
    });

    renderTodos(node);
    todoPanel.classList.add('open');
    panelSideSlider.classList.add('open');

    if (mobileOverlay && window.innerWidth <= 768) mobileOverlay.classList.add('show');

    updateProgress();
    updateMarkersDoneState();
  }

  // 面板字段编辑事件：桌面端双击、移动端单击
  panelTitle.addEventListener('dblclick', startEditPanelTitle);
  panelTitle.addEventListener('click', () => { if (window.innerWidth <= 768) startEditPanelTitle(); });
  panelMeta.addEventListener('dblclick', startEditPanelMeta);
  panelMeta.addEventListener('click', () => { if (window.innerWidth <= 768) startEditPanelMeta(); });
  panelCoord.addEventListener('dblclick', startEditPanelCoord);
  panelCoord.addEventListener('click', () => { if (window.innerWidth <= 768) startEditPanelCoord(); });

  // ====== 连线管理 ======
  function populateConnections(idx) {
    const pcSelect = document.getElementById('pcSelect');
    const pcList = document.getElementById('pcList');
    if (!pcSelect || !pcList) return;

    pcSelect.innerHTML = '<option value="">选择目标站点…</option>';
    nodeData.forEach((n, i) => {
      if (i === idx) return;
      const exists = ROUTE_SEGMENTS.some(([a, b]) =>
        (a === idx && b === i) || (a === i && b === idx)
      );
      if (exists) return;
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = n.name;
      pcSelect.appendChild(opt);
    });
    if (pcSelect.options.length === 1) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = '（已与所有站点相连）';
      opt.disabled = true;
      pcSelect.appendChild(opt);
    }

    pcList.innerHTML = '';
    const items = [];
    ROUTE_SEGMENTS.forEach((seg, segIdx) => {
      if (seg[0] !== idx && seg[1] !== idx) return;
      const isOutgoing = seg[0] === idx;
      const otherIdx = isOutgoing ? seg[1] : seg[0];
      items.push({ segIdx, isOutgoing, otherIdx });
    });
    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'pc-empty';
      empty.textContent = '暂无连线';
      pcList.appendChild(empty);
      return;
    }
    items.forEach(({ segIdx, isOutgoing, otherIdx }) => {
      const row = document.createElement('div');
      row.className = 'pc-item';
      row.innerHTML = `
        <span class="pc-arrow">${isOutgoing ? '→' : '←'}</span>
        <span class="pc-name">${escapeHtml(nodeData[otherIdx].name)}</span>
        <button class="pc-del" title="删除此连线">✕</button>
      `;
      row.querySelector('.pc-del').onclick = (ev) => {
        ev.stopPropagation();
        deleteSegmentAt(segIdx);
        populateConnections(idx);
      };
      pcList.appendChild(row);
    });
  }

  function closePanel() {
    todoPanel.classList.remove('open');
    panelSideSlider.classList.remove('open');
    activeNodeId = null;
    markers.forEach(m => {
      const root = m.getElement()?.querySelector('.station-marker');
      if (root) root.classList.remove('active');
    });
    if (mobileOverlay) mobileOverlay.classList.remove('show');
    updateProgress();
  }

  // ====== 待办列表 ======
  function renderTodos(node) {
    const doneCount = node.todos.filter(t => t.done).length;
    const pendingCount = node.todos.length - doneCount;

    document.getElementById('statDone').textContent = doneCount;
    document.getElementById('statPending').textContent = pendingCount;

    // 进度环
    const pct = node.todos.length > 0 ? Math.round((doneCount / node.todos.length) * 100) : 0;
    const circumference = 2 * Math.PI * 42;
    const ring = document.querySelector('.ring-fill');
    if (ring) {
      ring.style.strokeDasharray = circumference;
      ring.style.strokeDashoffset = circumference - (circumference * pct / 100);
    }
    document.getElementById('ringNum').textContent = pct + '%';

    document.getElementById('countHint').textContent = node.todos.length > 0
      ? `${pendingCount} 项待办 · ${doneCount} 项已完成` : '';
    document.getElementById('clearCompletedBtn').disabled = doneCount === 0;

    if (node.todos.length === 0) {
      todoList.innerHTML = `
        <div class="empty-state">
          <div class="icon">📡</div>
          <div class="text">暂无待办事项</div>
          <div class="text" style="margin-top:4px; font-size:11px; font-family: var(--font-mono);">在下方输入框添加</div>
        </div>`;
      return;
    }

    todoList.innerHTML = '';
    node.todos.forEach((todo, idx) => {
      const item = document.createElement('div');
      item.className = `todo-item${todo.done ? ' completed' : ''}`;
      item.draggable = true;
      item.dataset.idx = idx;
      const pri = todo.priority || 'normal';
      item.innerHTML = `
        <div class="todo-drag-handle" title="拖拽排序">⠿</div>
        <div class="priority-dot ${pri}" data-idx="${idx}" title="切换优先级"></div>
        <div class="todo-checkbox" data-idx="${idx}">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div class="todo-content">
          <div class="todo-text" data-idx="${idx}" title="双击编辑">${escapeHtml(todo.text)}</div>
        </div>
        <button class="todo-delete" data-idx="${idx}" title="删除">🗑</button>
      `;
      todoList.appendChild(item);
    });

    todoList.querySelectorAll('.todo-checkbox').forEach(cb => {
      cb.addEventListener('click', (e) => {
        const idx = parseInt(e.currentTarget.dataset.idx);
        const n = nodeData.find(n => n.id === activeNodeId);
        if (!n) return;
        n.todos[idx].done = !n.todos[idx].done;
        saveData();
        renderTodos(n);
        updateProgress();
        updateMarkersDoneState();
        checkAndAdvanceCharacter();
      });
    });

    todoList.querySelectorAll('.priority-dot').forEach(dot => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(e.currentTarget.dataset.idx);
        const n = nodeData.find(n => n.id === activeNodeId);
        if (!n) return;
        const cur = n.todos[idx].priority || 'normal';
        n.todos[idx].priority = ({ high: 'normal', normal: 'low', low: 'high' })[cur];
        saveData();
        renderTodos(n);
      });
    });

    todoList.querySelectorAll('.todo-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = parseInt(e.currentTarget.dataset.idx);
        const n = nodeData.find(n => n.id === activeNodeId);
        if (!n) return;
        n.todos.splice(idx, 1);
        saveData();
        renderTodos(n);
        updateProgress();
        updateMarkersDoneState();
      });
    });

    todoList.querySelectorAll('.todo-text').forEach(txt => {
      // 桌面端：双击编辑；移动端：单击编辑（移动端双击不可靠）
      txt.addEventListener('dblclick', (e) => startEdit(e.currentTarget));
      txt.addEventListener('click', (e) => {
        if (window.innerWidth <= 768) startEdit(e.currentTarget);
      });
    });

    setupDragReorder();
  }

    const idx = parseInt(textEl.dataset.idx);

    if (cleaned !== raw) {
      const pos = panelLabelInput.selectionStart - (raw.length - cleaned.length);
      panelLabelInput.value = cleaned;
      panelLabelInput.setSelectionRange(pos, pos);
    }

    const v = cleaned.trim();

    const saved = loadRouteSegments();

    if (saved && Array.isArray(saved) && saved.length > 0) {

      const valid = saved.filter(s => Array.isArray(s) && s.length === 2 && s[0] <= maxIdx && s[1] <= maxIdx && s[0] !== s[1]);

        // 防御 2：检查 localStorage 是否覆盖了 nodeData 里的所有节点。

        // 此时不要覆盖，保留 NODES_DEFAULT 之后的常量（这样南昌相关段才能画上）。
        const referenced = new Set();
        valid.forEach(([a, b]) => { referenced.add(a); referenced.add(b); });
        const allCovered = nodeData.every((_, idx) => referenced.has(idx));
        if (allCovered) {
          ROUTE_SEGMENTS.length = 0;

        }
