  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const cbName = '_amapCb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      const cleanup = () => {
        try { delete window[cbName]; } catch (_) {}
        if (script.parentNode) script.parentNode.removeChild(script);
      };
      const script = document.createElement('script');
      const sep = url.includes('?') ? '&' : '?';
      script.src = url + sep + 'callback=' + cbName;
      script.onerror = () => { reject(new Error('JSONP 加载失败')); cleanup(); };
      window[cbName] = (data) => { resolve(data); cleanup(); };
      document.body.appendChild(script);
      setTimeout(() => { if (window[cbName]) { reject(new Error('高德 JSONP 超时')); cleanup(); } }, 12000);
    });
  }

  async function amapDirectSearch(query, key) {
    const url = `https://restapi.amap.com/v3/place/text?key=${encodeURIComponent(key)}&keywords=${encodeURIComponent(query)}&region=中国&citylimit=false&extensions=base&offset=8&output=json`;
    let data;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      data = await r.json();
    } catch (e) {
      data = await jsonp(url);
    }
    if (data.status !== '1') throw new Error('高德 API: ' + (data.info || data.infocode || '错误'));
    return (data.pois || []).map(item => {
      const [lng, lat] = item.location.split(',').map(parseFloat);
      const addr = (item.address || '').trim() || (item.pname || '') + (item.cityname || '');
      return {
        name: item.name,
        address: addr,
        lat, lng,
        type: item.type || 'place',
      };
    });
  }

  async function doSearch(query) {
    const key = getAmapKey();
    if (!key) {
      searchResults.innerHTML =
        '<div class="search-empty">未配置高德 API Key<br>' +
        '<span style="font-size:10.5px;line-height:1.6;display:inline-block;text-align:left">' +
        '点顶部 🔑 配置高德地图 API Key 后即可搜索地点<br>' +
        '申请地址：console.amap.com（选「Web 服务 API」，个人开发者有免费额度）' +
        '</span></div>';
      return;
    }
    try {
      const data = await amapDirectSearch(query, key);
      if (!data || data.length === 0) {
        searchResults.innerHTML = '<div class="search-empty">没有找到结果，换个关键词试试</div>';
        return;
      }
      renderSearchResults(data);
    } catch (err) {
      console.error('Amap search error:', err);
      searchResults.innerHTML =
        '<div class="search-empty">高德搜索失败：' + escapeHtml(err.message || '未知错误') + '<br>' +
        '<span style="font-size:10px;opacity:.85">点 🔑 重新配置 key</span></div>';
    }
  }

  function renderSearchResults(results) {
    searchResults.innerHTML = '';
    results.forEach((item) => {
      const el = document.createElement('div');
      el.className = 'search-result-item';
      const name = item.name || '未命名地点';
      const addr = item.address || '';
      const lat = parseFloat(item.lat);
      const lng = parseFloat(item.lng);
      const type = item.type || 'place';
      el.innerHTML = `
        <span class="sri-icon">${typeIcon(type)}</span>
        <div class="sri-body">
          <div class="sri-name">${escapeHtml(name)}</div>
          <div class="sri-addr">${escapeHtml(addr)}</div>
          <div class="sri-coord">${lat.toFixed(4)}°N, ${lng.toFixed(4)}°E</div>
        </div>
      `;
      el.addEventListener('click', () => addMarkerFromSearch(item, name, lat, lng, addr));
      searchResults.appendChild(el);
    });
  }

  function typeIcon(type) {
    const map = {
      city:'🏙️', town:'🏘️', village:'🏘️', hamlet:'🏘️', suburb:'🏘️', neighbourhood:'🏘️',
      museum:'🏛️', attraction:'🏛️', park:'🌳', garden:'🌳',
      peak:'⛰️', mountain:'⛰️', hill:'⛰️', ridge:'⛰️',
      lake:'💧', river:'💧', water:'💧',
      restaurant:'🍴', food:'🍴', cafe:'☕',
      hotel:'🏨',
      railway:'🚂', station:'🚉', aerodrome:'✈️', airport:'✈️',
      monument:'🗿', memorial:'🗿', memorial_t:'🗿',
      temple:'⛩️', pagoda:'⛩️',
      default:'📍'
    };
    return map[type] || map.default;
  }

  function addMarkerFromSearch(item, name, lat, lng, addr) {
    const existingIds = nodeData.map(n => n.id);
    let newId = 1;
    while (existingIds.includes(newId)) newId++;
    const usedColors = new Set(nodeData.map(n => n.color));
    let color = NODE_COLORS.find(c => !usedColors.has(c)) || NODE_COLORS[nodeData.length % NODE_COLORS.length];
    const newNode = {
      id: newId,
      name: name.length > 16 ? name.slice(0, 16) : name,
      date: '', subtitle: (addr || '').split(',')[0] || '新添加',
      lat: lat, lng: lng, color: color,
      coord: `${lat.toFixed(2)}°N, ${lng.toFixed(2)}°E`,
      day: Math.max(...nodeData.map(n => n.day || 0), 0) + 1,
      todos: []
    };
    nodeData.push(newNode);
    const newIdx = nodeData.length - 1;
    if (ROUTE_SEGMENTS.length > 0) {
      const lastSeg = ROUTE_SEGMENTS[ROUTE_SEGMENTS.length - 1];
      ROUTE_SEGMENTS.push([lastSeg[1], newIdx]);
    } else {
      ROUTE_SEGMENTS.push([0, newIdx]);
    }
    saveAllData();
    rebuildMapOverlays();
    renderRouteInfo();
    showToast(`✅ 已添加：${newNode.name}`, 'success');
    closeSearchPanel();
    setTimeout(() => map.flyTo([lat, lng], 11, { duration: 0.8 }), 100);
  }

  function moveSegmentUp(idx) {
    if (idx <= 0) return;
    [ROUTE_SEGMENTS[idx - 1], ROUTE_SEGMENTS[idx]] = [ROUTE_SEGMENTS[idx], ROUTE_SEGMENTS[idx - 1]];
    applyRouteUpdate();
  }
  function moveSegmentDown(idx) {
    if (idx >= ROUTE_SEGMENTS.length - 1) return;
    [ROUTE_SEGMENTS[idx + 1], ROUTE_SEGMENTS[idx]] = [ROUTE_SEGMENTS[idx], ROUTE_SEGMENTS[idx + 1]];
    applyRouteUpdate();
  }
  function applyRouteUpdate() {
    try { saveAllData(); } catch (_) {}
    try { syncRouteOverlays(); } catch (e) { console.error('syncRouteOverlays:', e); }
    try { renderRouteInfo(); } catch (e) { console.error('renderRouteInfo:', e); }
    try { updateProgress(); } catch (_) {}
  }
  /* 轻量同步：仅刷新路线折线 + 距离标签 + 交互线，不动站点标记 */
  function syncRouteOverlays() {
    if (!map) return;
    if (Array.isArray(routeLines)) routeLines.forEach(rl => map.removeLayer(rl));
    routeLines = [];
    if (Array.isArray(glowLines)) glowLines.forEach(gl => map.removeLayer(gl));
    glowLines = [];
    if (Array.isArray(distMarkers)) distMarkers.forEach(dm => map.removeLayer(dm));
    distMarkers = [];
    if (Array.isArray(segLines)) segLines.forEach(s => map.removeLayer(s));
    segLines = [];

    ROUTE_SEGMENTS.forEach(([fi, ti]) => {
      const fn = nodeData[fi], tn = nodeData[ti];
      const segCoords = [[fn.lat, fn.lng], [tn.lat, tn.lng]];

      const gl = L.polyline(segCoords, { color: '#5e4a3a', weight: 6, opacity: 0.12, lineCap: 'round' }).addTo(map);
      glowLines.push(gl);
      const rl = L.polyline(segCoords, { color: '#4a3020', weight: 1.2, opacity: 0.65, dashArray: '4 4', lineCap: 'round', lineJoin: 'round', className: 'ink-route' }).addTo(map);
      routeLines.push(rl);

      const fromLL = L.latLng(fn.lat, fn.lng);
      const toLL = L.latLng(tn.lat, tn.lng);
      const distKm = Math.round(fromLL.distanceTo(toLL) / 1000);
      const mid = L.latLng((fn.lat + tn.lat) / 2, (fn.lng + tn.lng) / 2);
      const innerHTML = '<span class="dist-km">' + distKm + ' KM</span><span class="dl-sep">·</span><span>' + escapeHtml(fn.name) + '</span> <span class="dl-sep">→</span> <span>' + escapeHtml(tn.name) + '</span>';
      const text = distKm + ' KM · ' + fn.name + ' → ' + tn.name;
      const _ms = measureLabel(text);
      const distIcon = L.divIcon({ html: '<span class="dist-label">' + innerHTML + '</span>', className: 'dist-label-wrap', iconSize: [_ms[0], _ms[1]], iconAnchor: [_ms[0] / 2, _ms[1] / 2] });
      const dm = L.marker(mid, { icon: distIcon, draggable: false, autoPan: false, zIndexOffset: 1000 });
      dm.addTo(map);
      distMarkers.push(dm);

      const segLine = L.polyline(segCoords, { color: 'transparent', weight: 50, opacity: 0.001, interactive: true, bubblingMouseEvents: false }).addTo(map);
      segLine._segIdx = segLines.length;
      segLines.push(segLine);
    });

    setTimeout(function () {
      if (Array.isArray(distMarkers)) distMarkers.forEach(function (dm) {
        var el = dm.getElement();
        if (el) { var s = el.querySelector('.dist-label'); if (s) s.classList.add('show'); }
      });
    }, 100);
    bindSegLineEvents();
    // 给光带/墨线补上悬浮显示距离标识（initMap 里有这里漏了同步）
    const _showDistLabels = function () {
      if (!Array.isArray(distMarkers)) return;
      distMarkers.forEach(function (dm) {
        var el = dm.getElement();
        if (el) { var s = el.querySelector('.dist-label'); if (s) s.classList.add('show'); }
      });
    };
    const _hideDistLabels = function () {
      if (labelPlacementSegIdx >= 0) return;
      if (!Array.isArray(distMarkers)) return;
      distMarkers.forEach(function (dm) {
        var el = dm.getElement();
        if (el) { var s = el.querySelector('.dist-label'); if (s) s.classList.remove('show'); }
      });
    };
    glowLines.forEach(function (gl) { gl.on('mouseover', _showDistLabels); gl.on('mouseout', _hideDistLabels); });
    routeLines.forEach(function (rl) { rl.on('mouseover', _showDistLabels); rl.on('mouseout', _hideDistLabels); });
  }
  function deleteSegmentAt(idx) {
    if (idx < 0 || idx >= ROUTE_SEGMENTS.length) return;
    const [fi, ti] = ROUTE_SEGMENTS[idx];
    const fromName = nodeData[fi]?.name || '?';
    const toName = nodeData[ti]?.name || '?';
    if (!confirm(`删除第 ${idx + 1} 段：\n${fromName} → ${toName}？`)) return;
    ROUTE_SEGMENTS.splice(idx, 1);
    applyRouteUpdate();
    showToast('🗑️ 路线段已删除', 'success');
  }
  // ====== 通过站点编号（默认 idx+1）交换两个节点的位置 ======
  // 用于：点击"站点 · 07"徽章改成 04 → 把当前站点挪到 04 的位置，原 04 站点挪过来
  // - nodeData 整体对调 a 和 b
  // - 同步修正 ROUTE_SEGMENTS 中所有引用 idx 的数字
  // - 同步修正 characterNodeIndex（如果它指向 a 或 b）
  // - 重建地图覆盖物 + 重开当前节点的面板
  function swapNodesByIndex(a, b) {
    if (a === b) return;
    if (a < 0 || b < 0 || a >= nodeData.length || b >= nodeData.length) return;
    [nodeData[a], nodeData[b]] = [nodeData[b], nodeData[a]];
    ROUTE_SEGMENTS.forEach(seg => {
      if (seg[0] === a) seg[0] = b;
      else if (seg[0] === b) seg[0] = a;
      if (seg[1] === a) seg[1] = b;
      else if (seg[1] === b) seg[1] = a;
    });
    if (characterNodeIndex === a) characterNodeIndex = b;
    else if (characterNodeIndex === b) characterNodeIndex = a;
    saveData();
    saveRouteSegments();
    saveCharacterIndex();
    rebuildMapOverlays();
    // 重新打开当前站点（位置已变）
    const id = nodeData[b].id;
    openNode(id);
  }

  function deleteMarkerAt(idx) {
    if (idx < 0 || idx >= nodeData.length) return;
    const node = nodeData[idx];
    if (!confirm(`删除「${node.name}」？\n所有相关路线段也会一并删除。`)) return;
    const segsToRemove = [];
    ROUTE_SEGMENTS.forEach((seg, i) => { if (seg[0] === idx || seg[1] === idx) segsToRemove.push(i); });
    segsToRemove.reverse().forEach(i => ROUTE_SEGMENTS.splice(i, 1));
    for (let i = 0; i < ROUTE_SEGMENTS.length; i++) {
      if (ROUTE_SEGMENTS[i][0] > idx) ROUTE_SEGMENTS[i][0]--;
      if (ROUTE_SEGMENTS[i][1] > idx) ROUTE_SEGMENTS[i][1]--;
    }
    nodeData.splice(idx, 1);
    if (characterNodeIndex === idx) characterNodeIndex = Math.max(0, idx - 1);
    else if (characterNodeIndex > idx) characterNodeIndex--;
    saveCharacterIndex(characterNodeIndex);
    saveAllData(); rebuildMapOverlays(); renderRouteInfo(); updateCharacterStatus();
    showToast(`🗑️ 已删除「${node.name}」`, 'success');
  }

  // 🔑 配置高德 key —— 改用页面内嵌弹层（替代原生 prompt，兼容手机端）
  const headerAmapKeyBtn = document.getElementById('headerAmapKeyBtn');
  const keyDialogBackdrop = document.getElementById('keyDialogBackdrop');
  const keyDialogInput = document.getElementById('keyDialogInput');
  const keyDialogStatus = document.getElementById('keyDialogStatus');
  const keyDialogCounter = document.getElementById('keyDialogCounter');
  const keyDialogToggle = document.getElementById('keyDialogToggle');
  const keyDialogSaveBtn = document.getElementById('keyDialogSaveBtn');
  const keyDialogCancelBtn = document.getElementById('keyDialogCancelBtn');
  const keyDialogClearBtn = document.getElementById('keyDialogClearBtn');

  function maskKey(k) {
    if (!k) return '';
    if (k.length <= 10) return k[0] + '…' + k[k.length - 1];
    return k.slice(0, 4) + '…' + k.slice(-4);
  }

  function renderKeyDialogStatus() {
    const cur = getAmapKey();
    if (cur) {
      keyDialogStatus.className = 'kd-status configured';
      keyDialogStatus.innerHTML =
        '<span class="kd-dot"></span>' +
        '<span>已配置：<span class="kd-mask">' + maskKey(cur) + '</span>（' + cur.length + ' 字符）</span>' +
        '<button type="button" class="kd-clear-link" id="keyDialogInlineClear">清除</button>';
      const inlineClear = document.getElementById('keyDialogInlineClear');
      inlineClear?.addEventListener('click', () => {
        keyDialogInput.value = '';
        keyDialogInput.focus();
        updateCounter();
      });
      keyDialogClearBtn.style.display = '';
    } else {
      keyDialogStatus.className = 'kd-status unset';
      keyDialogStatus.innerHTML =
        '<span class="kd-dot"></span>' +
        '<span>未配置 key（搜索将回退到本地代理）</span>';
      keyDialogClearBtn.style.display = 'none';
    }
  }

  function updateCounter() {
    const len = (keyDialogInput.value || '').length;
    keyDialogCounter.textContent = len + ' 字符';
  }

  function openAmapKeyDialog() {
    // 用当前 key 预填，方便查看/微调
    const cur = getAmapKey();
    keyDialogInput.value = cur || '';
    keyDialogInput.classList.remove('invalid');
    renderKeyDialogStatus();
    updateCounter();
    keyDialogBackdrop.classList.add('show');
    // 下一帧聚焦 + 选中已有内容（方便整体替换）
    setTimeout(() => {
      keyDialogInput.focus();
      try { keyDialogInput.setSelectionRange(0, keyDialogInput.value.length); } catch (_) {}
    }, 30);
  }

  function closeKeyDialog() {
    keyDialogBackdrop.classList.remove('show');
  }

  function saveKeyFromDialog() {
    const k = (keyDialogInput.value || '').trim();
    setAmapKey(k);
    if (k) {
      showToast('🔑 高德 key 已配置，下次搜索生效', 'success');
    } else {
      showToast('已清除高德 key，将回退到本地代理', 'warn');
    }
    // 同步顶部按钮的 active 态
    if (k) {
      headerAmapKeyBtn?.classList.add('active');
      headerAmapKeyBtn.title = '已配置高德 key，点此修改';
    } else {
      headerAmapKeyBtn?.classList.remove('active');
      headerAmapKeyBtn.title = '配置高德地图 API Key（国内推荐）';
    }
    closeKeyDialog();
  }

  // 事件绑定
  headerAmapKeyBtn?.addEventListener('click', openAmapKeyDialog);
  keyDialogCancelBtn?.addEventListener('click', closeKeyDialog);
  keyDialogSaveBtn?.addEventListener('click', saveKeyFromDialog);
  keyDialogClearBtn?.addEventListener('click', () => {
    keyDialogInput.value = '';
    updateCounter();
    keyDialogInput.focus();
  });
  keyDialogInput?.addEventListener('input', updateCounter);
  keyDialogInput?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveKeyFromDialog(); }
    if (e.key === 'Escape') { e.preventDefault(); closeKeyDialog(); }
  });
  // 点击背景关闭（点 dialog 卡片本身不关）
  keyDialogBackdrop?.addEventListener('click', (e) => {
    if (e.target === keyDialogBackdrop) closeKeyDialog();
  });
  // 显示/隐藏切换（虽然我们默认 text 类型，但给个开关也方便）
  keyDialogToggle?.addEventListener('click', () => {
    keyDialogInput.type = keyDialogInput.type === 'text' ? 'password' : 'text';
    keyDialogToggle.textContent = keyDialogInput.type === 'password' ? '🙈' : '👁';
  });

  if (getAmapKey()) {
    headerAmapKeyBtn?.classList.add('active');
    headerAmapKeyBtn.title = '已配置高德 key，点此修改';
  }

  function setEditMode(on) {
    isEditMode = !!on;
    document.body.classList.toggle('edit-mode', isEditMode);
    editModeBanner?.classList.toggle('show', isEditMode);
    markers.forEach((m, i) => {
      const root = m.getElement()?.querySelector('.station-marker');
      if (!root) return;
      const del = root.querySelector('.sm-del');
      if (del) del.onclick = (e) => { e.stopPropagation(); deleteMarkerAt(i); };
    });
  }
  function bindMarkerDblClick() {
    markers.forEach((m, i) => {
      const root = m.getElement()?.querySelector('.station-marker');
      if (!root) return;
      root.addEventListener('dblclick', (e) => { e.stopPropagation(); setEditMode(true); });
    });
  }
  exitEditModeBtn?.addEventListener('click', () => setEditMode(false));

  function rebuildMapOverlays() {
    if (!map) return;
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    if (Array.isArray(distMarkers)) distMarkers.forEach(dm => map.removeLayer(dm));
    distMarkers = [];
    if (Array.isArray(segLines)) segLines.forEach(s => map.removeLayer(s));
    segLines = [];
    if (Array.isArray(routeLines)) routeLines.forEach(rl => map.removeLayer(rl));
    routeLines = [];
    if (Array.isArray(glowLines)) glowLines.forEach(gl => map.removeLayer(gl));
    glowLines = [];

    ROUTE_SEGMENTS.forEach(([fi, ti]) => {
      const segCoords = [[nodeData[fi].lat, nodeData[fi].lng], [nodeData[ti].lat, nodeData[ti].lng]];
      const gl = L.polyline(segCoords, { color: '#5e4a3a', weight: 6, opacity: 0.12, lineCap: 'round' }).addTo(map);
      glowLines.push(gl);
      const rl = L.polyline(segCoords, { color: '#4a3020', weight: 1.2, opacity: 0.65, dashArray: '4 4', lineCap: 'round', lineJoin: 'round', className: 'ink-route' }).addTo(map);
      routeLines.push(rl);
    });

    nodeData.forEach((node, i) => {
      const marker = createMarker(node, i);
      marker.addTo(map);
      markers.push(marker);
    });

    ROUTE_SEGMENTS.forEach(([fi, ti]) => {
      const fn = nodeData[fi], tn = nodeData[ti];
      const fromLL = L.latLng(fn.lat, fn.lng);
      const toLL = L.latLng(tn.lat, tn.lng);
      const distKm = Math.round(fromLL.distanceTo(toLL) / 1000);
      const mid = L.latLng((fn.lat + tn.lat) / 2, (fn.lng + tn.lng) / 2);
      const innerHTML = `<span class="dist-km">${distKm} KM</span><span class="dl-sep">·</span><span>${escapeHtml(fn.name)}</span> <span class="dl-sep">→</span> <span>${escapeHtml(tn.name)}</span>`;
      const text = `${distKm} KM · ${fn.name} → ${tn.name}`;
      const [w, h] = measureLabel(text);
      const distIcon = L.divIcon({ html: `<span class="dist-label">${innerHTML}</span>`, className: 'dist-label-wrap', iconSize: [w, h], iconAnchor: [w / 2, h / 2] });
      const dm = L.marker(mid, { icon: distIcon, draggable: false, autoPan: false, zIndexOffset: 1000 });
      dm.addTo(map);
      distMarkers.push(dm);

      // 重建交互层 segLine
      const segLine = L.polyline([
        [fn.lat, fn.lng], [tn.lat, tn.lng]
      ], {
        color: 'transparent', weight: 50, opacity: 0.001,
        interactive: true, bubblingMouseEvents: false,
      }).addTo(map);
      segLine._segIdx = segLines.length;
      segLines.push(segLine);
    });

    bindSegLineEvents();

    setTimeout(() => {
      if (Array.isArray(distMarkers)) {
        distMarkers.forEach(dm => {
          const el = dm.getElement();
          if (el) { const s = el.querySelector('.dist-label'); if (s) s.classList.add('show'); }
        });
      }
    }, 100);

    bindMarkerDblClick();
    updateMarkersDoneState();
  }

  // 启动
  initMap();
  renderRouteInfo();
  updateProgress();
  updateMarkersDoneState();
  bindMarkerDblClick();

    function exportToHTML() {
    try {
      // ====== 全新导出方案 ======
      // 核心思路：不破坏当前页面，用 cloneNode 生成一份副本，
      // 在副本上替换数据标记，然后序列化下载。
      // 用 Blob + URL.createObjectURL 替代 data: URL，避免大数据截断。
      // 导出的文件自带 exportToHTML，接收方可以继续导出。

      const nodesJSON = JSON.stringify(nodeData, null, 2);
      const segmentsJSON = JSON.stringify(ROUTE_SEGMENTS, null, 2);

      // 1) 深度克隆整个文档（不影响当前页面）
      var clone = document.documentElement.cloneNode(true);

      // 2) 清理克隆中的地图容器（去除 Leaflet 动态注入的 DOM）
      var cloneMap = clone.querySelector('#map');
      if (cloneMap) {
        cloneMap.innerHTML = '';
        cloneMap.removeAttribute('class');
        cloneMap.removeAttribute('tabindex');
        cloneMap.removeAttribute('style');
      }

      // 3) 找到应用脚本（包含 NODES_DEFAULT 的那个），替换其中的数据
      var scripts = clone.querySelectorAll('script');
      var appScript = null;
      for (var i = 0; i < scripts.length; i++) {
        if (scripts[i].textContent.indexOf('NODES_DEFAULT') >= 0) {
          appScript = scripts[i];
          break;
        }
      }

      if (appScript) {
        var src = appScript.textContent;

        // 替换 NODES_DEFAULT → 当前 nodeData
        src = src.replace(
          /(\/\/ BEGIN_NODES_DEFAULT\s*const NODES_DEFAULT\s*=\s*)\[[\s\S]*?\];(\s*\/\/ END_NODES_DEFAULT)/,
          '$1' + nodesJSON + ';$2'
        );

        // 替换 ROUTE_SEGMENTS → 当前连线
        src = src.replace(
          /(\/\/ BEGIN_ROUTE_SEGMENTS_DEFAULT\s*const ROUTE_SEGMENTS\s*=\s*)\[[\s\S]*?\];(\s*\/\/ END_ROUTE_SEGMENTS_DEFAULT)/,
          '$1' + segmentsJSON + ';$2'
        );

        appScript.textContent = src;
      }

      // 4) 序列化克隆
      var doctype = '<!DOCTYPE html>\n';
      var full = doctype + clone.outerHTML;

      // 5) 用 Blob 下载（比 data: URL 更可靠）
      var blob = new Blob([full], { type: 'text/html;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.download = '实践行.html';
      a.href = url;
      a.click();
      URL.revokeObjectURL(url);

    } catch (e) {
      alert('导出失败: ' + e.message);
    }
  }
</script>
